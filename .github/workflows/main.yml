# GitHub Actions 配置
# 用于打包 JavaFX 桌面应用

name: Build Desktop Apps

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  # Windows 打包
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 编译项目
        run: mvn clean package --batch-mode

      - name: 打包 Windows 应用
        run: |
          jpackage `
            --type exe `
            --name "面霸宝AI" `
            --app-version ${{ github.event.inputs.version || '1.0.0' }} `
            --vendor "Booker" `
            --input target `
            --main-jar booker-desktop-1.0-SNAPSHOT.jar `
            --main-class com.booker.desktop.MainApp `
            --dest target/dist `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --icon src/main/resources/icon.ico
        shell: pwsh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 面霸宝AI-Windows
          path: target/dist/*.exe

  # macOS 打包
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 编译项目
        run: mvn clean package --batch-mode

      - name: 打包 macOS 应用
        run: |
          jpackage \
            --type dmg \
            --name "面霸宝AI" \
            --app-version ${{ github.event.inputs.version || '1.0.0' }} \
            --vendor "Booker" \
            --input target \
            --main-jar booker-desktop-1.0-SNAPSHOT.jar \
            --main-class com.booker.desktop.MainApp \
            --dest target/dist \
            --icon src/main/resources/AppIcon.icns

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 面霸宝AI-macOS
          path: target/dist/*.dmg

  # Linux 打包
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 编译项目
        run: mvn clean package --batch-mode

      - name: 打包 Linux 应用
        run: |
          jpackage \
            --type deb \
            --name "booker-ai" \
            --app-version ${{ github.event.inputs.version || '1.0.0' }} \
            --vendor "Booker" \
            --input target \
            --main-jar booker-desktop-1.0-SNAPSHOT.jar \
            --main-class com.booker.desktop.MainApp \
            --dest target/dist \
            --linux-deb-maintainer "support@booker.com" \
            --icon src/main/resources/icon.png

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 面霸宝AI-Linux
          path: target/dist/*.deb

  # 创建 Release（仅在推送标签时）
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          generate_release_notes: true
